name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: bun-darwin-arm64, asset: yaolai-cli-darwin-arm64 }
          - { os: ubuntu-latest, target: bun-linux-x64, asset: yaolai-cli-linux-x64 }
          - { os: windows-latest, target: bun-windows-x64, asset: yaolai-cli-windows-x64.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - name: Generate skills-content.ts (must precede tests + build)
        run: |
          bun -e "
          import { readdirSync, readFileSync, writeFileSync, statSync } from 'node:fs';
          import { join } from 'node:path';
          const root = 'src/skills';
          const out = {};
          for (const dir of readdirSync(root)) {
            const p = join(root, dir, 'SKILL.md');
            try { if (!statSync(p).isFile()) continue; } catch { continue; }
            out[\`\${dir}/SKILL.md\`] = readFileSync(p, 'utf8');
          }
          writeFileSync(
            'src/commands/skills-content.ts',
            '// AUTO-GENERATED by CI release.yml\nexport const SKILL_FILES: Record<string, string> = ' + JSON.stringify(out, null, 2) + ';\n'
          );
          console.log('generated', Object.keys(out).length);
          "
      - run: bun test
      - name: Build binary
        run: bun build src/cli.ts --compile --minify --target=${{ matrix.target }} --outfile dist/${{ matrix.asset }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          fail_on_unmatched_files: true
